              - sensor.guardian_battery_modul_3_bewertung
              - sensor.guardian_battery_modul_3_empfehlung
              - sensor.guardian_battery_modul_3_soc_abweichung
              - sensor.guardian_battery_modul_3_soc
              - sensor.guardian_battery_modul_3_zustand
              - sensor.guardian_battery_modul_3_spannung
              - sensor.guardian_battery_modul_3_strom
              - sensor.guardian_battery_modul_3_temperatur
              - sensor.guardian_battery_modul_3_zellspreizung

          - type: entities
            title: Modul 4
            entities:
              - sensor.guardian_battery_modul_4_gesundheit
              - sensor.guardian_battery_modul_4_bewertung
              - sensor.guardian_battery_modul_4_empfehlung
              - sensor.guardian_battery_modul_4_soc_abweichung
              - sensor.guardian_battery_modul_4_soc
              - sensor.guardian_battery_modul_4_zustand
              - sensor.guardian_battery_modul_4_spannung
              - sensor.guardian_battery_modul_4_strom
              - sensor.guardian_battery_modul_4_temperatur
              - sensor.guardian_battery_modul_4_zellspreizung

          - type: entities
            title: Modul 5
            entities:
              - sensor.guardian_battery_modul_5_gesundheit
              - sensor.guardian_battery_modul_5_bewertung
              - sensor.guardian_battery_modul_5_empfehlung
              - sensor.guardian_battery_modul_5_soc_abweichung
