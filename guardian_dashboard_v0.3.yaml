title: Guardian EMS
views:
  - title: Batterie
    path: batterie
    icon: mdi:shield-battery
    type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Guardian Battery
            icon: mdi:shield-battery
          - type: entities
            entities:
              - sensor.guardian_battery_guardian_batteriestatus
              - sensor.guardian_battery_guardian_health_score
              - sensor.guardian_battery_guardian_auffalligstes_modul
              - sensor.guardian_battery_guardian_empfehlung
              - sensor.guardian_battery_guardian_erkannte_module
              - sensor.guardian_battery_guardian_aktive_batteriealarme
              - sensor.guardian_battery_guardian_letzter_batteriealarm
              - sensor.guardian_battery_guardian_letzte_aktualisierung

      - type: grid
        cards:
          - type: heading
            heading: Health Score der Module
            icon: mdi:heart-pulse
          - type: gauge
            entity: sensor.guardian_battery_modul_1_health_score
            name: Modul 1
            min: 0
            max: 100
            severity: {green: 80, yellow: 50, red: 0}
          - type: gauge
            entity: sensor.guardian_battery_modul_2_health_score
            name: Modul 2
            min: 0
            max: 100
            severity: {green: 80, yellow: 50, red: 0}
          - type: gauge
            entity: sensor.guardian_battery_modul_3_health_score
            name: Modul 3
            min: 0
            max: 100
            severity: {green: 80, yellow: 50, red: 0}
          - type: gauge
            entity: sensor.guardian_battery_modul_4_health_score
            name: Modul 4
            min: 0
            max: 100
            severity: {green: 80, yellow: 50, red: 0}
          - type: gauge
            entity: sensor.guardian_battery_modul_5_health_score
            name: Modul 5
            min: 0
            max: 100
            severity: {green: 80, yellow: 50, red: 0}
          - type: gauge
            entity: sensor.guardian_battery_modul_6_health_score
            name: Modul 6
            min: 0
            max: 100
            severity: {green: 80, yellow: 50, red: 0}

      - type: grid
        cards:
          - type: heading
            heading: Modulbewertungen
            icon: mdi:text-box-check

          - type: entities
            title: Modul 1
            entities:
              - sensor.guardian_battery_modul_1_gesundheit
              - sensor.guardian_battery_modul_1_bewertung
              - sensor.guardian_battery_modul_1_empfehlung
              - sensor.guardian_battery_modul_1_soc_abweichung
              - sensor.guardian_battery_modul_1_soc
              - sensor.guardian_battery_modul_1_zustand
              - sensor.guardian_battery_modul_1_spannung
              - sensor.guardian_battery_modul_1_strom
              - sensor.guardian_battery_modul_1_temperatur
              - sensor.guardian_battery_modul_1_zellspreizung

          - type: entities
            title: Modul 2
            entities:
              - sensor.guardian_battery_modul_2_gesundheit
              - sensor.guardian_battery_modul_2_bewertung
              - sensor.guardian_battery_modul_2_empfehlung
              - sensor.guardian_battery_modul_2_soc_abweichung
              - sensor.guardian_battery_modul_2_soc
              - sensor.guardian_battery_modul_2_zustand
              - sensor.guardian_battery_modul_2_spannung
              - sensor.guardian_battery_modul_2_strom
              - sensor.guardian_battery_modul_2_temperatur
              - sensor.guardian_battery_modul_2_zellspreizung

          - type: entities
