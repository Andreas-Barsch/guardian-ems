              - sensor.guardian_battery_modul_6_temperatur
              - sensor.guardian_battery_modul_6_zellspreizung

      - type: grid
        cards:
          - type: heading
            heading: Zellspreizung – 24 Stunden
            icon: mdi:chart-line
          - type: history-graph
            hours_to_show: 24
            entities:
              - sensor.guardian_battery_modul_1_zellspreizung
              - sensor.guardian_battery_modul_2_zellspreizung
              - sensor.guardian_battery_modul_3_zellspreizung
              - sensor.guardian_battery_modul_4_zellspreizung
              - sensor.guardian_battery_modul_5_zellspreizung
              - sensor.guardian_battery_modul_6_zellspreizung

      - type: grid
        cards:
          - type: heading
            heading: Ladezustand – 24 Stunden
            icon: mdi:battery-clock
          - type: history-graph
            hours_to_show: 24
            entities:
              - sensor.guardian_battery_modul_1_soc
              - sensor.guardian_battery_modul_2_soc
              - sensor.guardian_battery_modul_3_soc
